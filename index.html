<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyVitals - Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0f172a; 
    --panel:     #1e293b;
    --border:    #334155;
    --blue:      #3b82f6;
    --blue-dim:  #3b82f620;
    --red:       #ef4444;
    --text:      #f8fafc;
    --text-dim:  #94a3b8;
    --radius:    16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; }

  .setup-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 30px; width: 100%; max-width: 380px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; }
  .setup-icon { font-size: 48px; margin-bottom: 10px; }
  .setup-card h2 { margin-bottom: 8px; font-weight: 600; font-size: 24px; }
  .setup-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
  
  .form-group { margin-bottom: 20px; text-align: left; }
  .form-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;}
  .form-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 10px; font-size: 15px; outline: none; transition: border-color 0.3s; }
  .form-group input:focus { border-color: var(--blue); }

  .btn-main { width: 100%; background: var(--blue); color: #fff; border: none; padding: 16px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px var(--blue-dim); }
  .btn-main:active { transform: scale(0.98); }

  .error-msg { color: var(--red); font-size: 13px; margin-bottom: 15px; display: none; background: #ef444420; padding: 10px; border-radius: 8px; border: 1px solid var(--red); }
</style>
</head>
<body>

<div class="setup-card">
  <div class="setup-icon">🏥</div>
  <h2>MyVitals Portal</h2>
  <p>Please log into your assigned monitoring unit.</p>
  
  <div id="login-error" class="error-msg"></div>
  
  <div class="form-group">
    <label>Your Full Name</label>
    <input type="text" id="patient-name" placeholder="e.g., Alice Smith" autocomplete="off">
  </div>
  <div class="form-group">
    <label>Device ID (From your Doctor)</label>
    <input type="text" id="device-id" placeholder="e.g., rig_01" autocomplete="off">
  </div>
  
  <button class="btn-main" onclick="saveProfile()">View My Vitals</button>
</div>

<script>
  window.onload = () => {
    const profile = JSON.parse(localStorage.getItem('myVitalsProfile'));
    if (profile && profile.name && profile.deviceId) {
      window.location.href = "dashboard.html";
    }
  };

  function saveProfile() {
    const name = document.getElementById('patient-name').value.trim();
    const device = document.getElementById('device-id').value.trim();
    const errorBox = document.getElementById('login-error');
    
    errorBox.style.display = 'none';

    if (!name || !device) { 
      errorBox.textContent = "Please fill in both fields.";
      errorBox.style.display = 'block';
      return; 
    }
    
    // Bypass strict verification so it works standalone on the APK
    localStorage.setItem('myVitalsProfile', JSON.stringify({ name: name, deviceId: device }));
    window.location.href = "dashboard.html";
  }
</script>
</body>
</html>
